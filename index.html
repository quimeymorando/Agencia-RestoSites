<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════════════════════
         SEO INTERNACIONAL — hreflang (estático para crawlers)
         Estos tags son leídos por Google sin ejecutar JS.
         ═══════════════════════════════════════════════════════ -->
    <link rel="alternate" hreflang="en"        href="https://restosites.com/" />
    <link rel="alternate" hreflang="es"        href="https://restosites.com/es/" />
    <link rel="alternate" hreflang="pt"        href="https://restosites.com/pt/" />
    <link rel="alternate" hreflang="x-default" href="https://restosites.com/" />

    <!-- Canonical (default = inglés; JS actualiza dinámicamente) -->
    <link rel="canonical" href="https://restosites.com/" />

    <!-- ═══════════════════════════════════════════
         SEO Meta Tags (EN — idioma por defecto)
         El LanguageContext.tsx los actualiza vía JS
         cuando el usuario cambia de idioma.
         ═══════════════════════════════════════════ -->
    <title>RestoSites | Restaurant Websites That Bring More Customers</title>
    <meta name="description" content="Professional restaurant website design for restaurants, cafés and bars. Show your menu, location and allow customers to reserve tables easily. Delivered in 3–5 days." />
    <meta name="keywords" content="restaurant website, websites for restaurants, restaurant web design, restaurant web design service, restaurant website design" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="RestoSites" />
    <meta property="og:locale"      content="en_US" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:locale:alternate" content="pt_BR" />
    <meta property="og:title"       content="RestoSites | Restaurant Websites That Bring More Customers" />
    <meta property="og:description" content="We build professional restaurant websites for cafés, bars and restaurants. Delivered in 3–5 days. Show your menu online and get more reservations." />
    <meta property="og:url"         content="https://restosites.com/" />
    <meta property="og:image"       content="https://restosites.com/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="RestoSites | Restaurant Websites That Bring More Customers" />
    <meta name="twitter:description" content="Professional restaurant websites delivered in 3–5 days. Menu, location & reservations." />
    <meta name="twitter:image"       content="https://restosites.com/og-image.jpg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- ═══════════════════════════════════
         Schema.org JSON-LD — Structured Data
         ═══════════════════════════════════ -->

    <!-- ProfessionalService / LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "RestoSites",
      "description": "Professional restaurant website design agency helping restaurants get online and attract more customers.",
      "url": "https://restosites.com",
      "logo": "https://restosites.com/favicon.svg",
      "sameAs": [],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Búzios",
        "addressRegion": "Rio de Janeiro",
        "addressCountry": "BR"
      },
      "serviceType": "Restaurant Website Design",
      "areaServed": "Worldwide",
      "availableLanguage": ["English", "Spanish", "Portuguese"]
    }
    </script>

    <!-- WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "RestoSites",
      "url": "https://restosites.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://restosites.com/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
